springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

aiq:
  web:
    cors:
      allowed-origins:
        - http://localhost:5173
        - http://127.0.0.1:5173
        - http://[::1]:5173
      allowed-origin-patterns:
        - http://localhost:[*]
        - http://127.0.0.1:[*]
      allowed-methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed-headers:
        - Content-Type
        - Accept
        - Authorization
      max-age-seconds: 3600
  limit:
    fake:
      enabled: true
    codex:
      timeout: 30s
      max-output-bytes: 100000
  queue:
    limit-resume:
      enabled: true
      poll-interval: 60s
  executor:
    fake:
      enabled: true
    codex:
      enabled: false
