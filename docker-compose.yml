services:
  postgres:
    image: postgres:16-alpine
    container_name: aiqueue-postgres
    environment:
      POSTGRES_DB: aiqueue
      POSTGRES_USER: aiqueue
      POSTGRES_PASSWORD: aiqueue
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiqueue -d aiqueue"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
